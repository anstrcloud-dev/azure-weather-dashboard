<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        h1 {
            color: white;
            text-align: center;
            font-size: 2rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            background: rgba(255,255,255,0.15);
            color: white;
            outline: none;
        }

            input::placeholder {
                color: rgba(255,255,255,0.6);
            }

        button {
            padding: 14px 28px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

            button:hover {
                background: #c73652;
            }

        .weather-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .city-name {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .country {
            color: rgba(255,255,255,0.7);
            margin-bottom: 20px;
        }

        .weather-icon {
            width: 100px;
            height: 100px;
        }

        .temperature {
            font-size: 4rem;
            font-weight: 700;
            margin: 10px 0;
        }

        .description {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 30px;
            text-transform: capitalize;
        }

        .details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .detail-item {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
        }

        .detail-label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .error {
            background: rgba(233,69,96,0.3);
            border: 1px solid #e94560;
            border-radius: 12px;
            padding: 15px 20px;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⛅ Weather Dashboard</h1>

        <form class="search-box" method="POST">
            <input type="text" name="city" placeholder="Search city..." required
                   value="{{ request.form.get('city', '') }}">
            <button type="submit">Search</button>
        </form>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        {% if weather %}
        <div class="weather-card">
            <div class="city-name">{{ weather.city }}</div>
            <div class="country">{{ weather.country }}</div>
            <img class="weather-icon"
                 src="https://openweathermap.org/img/wn/{{ weather.icon }}@2x.png"
                 alt="{{ weather.description }}">
            <div class="temperature">{{ weather.temperature }}°C</div>
            <div class="description">{{ weather.description }}</div>
            <div class="details">
                <div class="detail-item">
                    <div class="detail-label">Feels like</div>
                    <div class="detail-value">{{ weather.feels_like }}°C</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Humidity</div>
                    <div class="detail-value">{{ weather.humidity }}%</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Wind</div>
                    <div class="detail-value">{{ weather.wind_speed }} m/s</div>
                </div>
            </div>
        </div>
        {% endif %}
    </div>
</body>
</html>
